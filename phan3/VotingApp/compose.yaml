services:
  vote:
    image: dockersamples/examplevotingapp_vote
    ports:
      - "5001:80"
    depends_on:
      - redis

  result:
    image: dockersamples/examplevotingapp_result
    ports:
      - "5002:80"
    depends_on:
      - db

  worker:
    image: dockersamples/examplevotingapp_worker
    depends_on:
      - redis
      - db

  redis:
    image: redis:alpine

  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
