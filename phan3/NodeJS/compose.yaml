services:
  mongodb:
    image: mongo:latest
    container_name: mongo_db
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    # Yêu cầu 4: Thêm Healthcheck cho MongoDB
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  node-app:
    build: .
    container_name: node_service
    ports:
      - "3000:3000"
    environment:
      MONGO_URI: mongodb://mongodb:27017/mydatabase
    # Yêu cầu 4: Node.js chỉ khởi động khi MongoDB đã "khỏe mạnh"
    depends_on:
      mongodb:
        condition: service_healthy

volumes:
  mongo_data:
